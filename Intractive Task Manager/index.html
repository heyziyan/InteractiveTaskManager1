<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body data-theme="light">
    <main>
        <nav>
            <div class="nav-left">
                <i class="ri-task-line"></i>
                <h2>Task Manager</h2>
            </div>

            <div class="nav-right">
                <i class="ri-moon-fill"></i>
            </div>
        </nav>

        <section class="task-form">
            <h2> <span><i class="ri-add-large-line"></i></span> Create New Task</h2>

            <form>
                <input type="text" placeholder="Enter Task title..." class="input-title">
                <select class="category">
                    <option value="">Select Category</option>
                    <option value="Study">Study</option>
                    <option value="Work">Work</option>
                    <option value="Personal">Personal</option>
                </select>
                <button class="add-task"> <span><i class="ri-add-large-line"></i></span>Add Task</button>
            </form>
        </section>

        <section class="task-counter">
            <div class="counter-card">
                <h3>Total Tasks</h3>
                <span class="total">10</span>
            </div>

            <div class="counter-card">
                <h3>Completed</h3>
                <span class="completed">5</span>
            </div>

            <div class="counter-card">
                <h3>Pending</h3>
                <span class="pending">5</span>
            </div>
        </section>

        <section class="task-container">
            <!-- <div class="task-card" data-id="1" data-status="pending" data-category="study">
                <div class="task-top">
                    <h2>Learn JavaScript</h2>
                    <span class="badge">Study</span>
                </div>

                <p class="status">Pending</p>

                <div class="btns">
                    <button class="edit"><span><i class="ri-edit-line"></i></span>Edit</button>
                    <button class="complete"><span><i class="ri-check-line"></i></span>Complete</button>
                    <button class="delete"><span><i class="ri-delete-bin-line"></i></span>Delete</button>
                </div>
            </div> -->
        </section>
    </main>


    <script src="script.js"></script>
</body>

</html>
